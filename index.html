<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embracing Minimalism Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- General Page Reset and Centering --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5; /* Light grey background to make the card pop */
            font-family: 'Sora', sans-serif;
            color: #111; /* Default text color */
        }

        /* --- Card Container --- */
        .card-container {
            background-color: #ffffff;
            width: 320px; /* Specific width for the card */
            padding: 24px;
            border-radius: 16px; /* Soft, large border radius */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); /* Very subtle, soft shadow */
            display: flex;
            flex-direction: column;
            gap: 16px; /* Controls spacing between content elements */
        }

        /* --- Image Section --- */
        .card-image-wrapper {
            width: 100%;
            height: 180px; /* Fixed height for image area */
            background-color: #fde4eb; /* Light pink/mauve background */
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Keeps the cactus image within bounds */
        }

        /* Make the cactus image fit the wrapper */
        .cactus-img {
            height: 90%; /* Scale the cactus slightly smaller than the frame */
            width: auto;
            display: block;
        }

        /* --- Text Content Section --- */
        .card-content {
            display: flex;
            flex-direction: column;
            gap: 12px; /* Spacing between title and description */
        }

        .category {
            color: #6a0dad; /* Purple text for category */
            font-size: 14px;
            font-weight: 600;
            text-transform: capitalize; /* Ensure 'Design' is capitalized */
            margin-top: 4px; /* Slight extra gap after image */
        }

        .title {
            font-size: 20px;
            font-weight: 700;
            margin: 0; /* Clear default margins */
            line-height: 1.3;
        }

        .description {
            color: #555; /* Slightly lighter description text */
            font-size: 16px;
            line-height: 1.6;
            margin: 0;
            font-weight: 400;
        }

        /* --- Author Section --- */
        .author {
            color: #888; /* Dimmed author text color */
            font-size: 14px;
            font-weight: 600;
            margin-top: 10px; /* Separate author slightly from body text */
        }

    </style>
</head>
<body>

    <div class="card-container">
        
        <div class="card-image-wrapper">
            <img src="cactus_image.png" alt="Cactus in a terracotta pot" class="cactus-img">
        </div>

        <div class="card-content">
            <span class="category">Design</span>
            <h1 class="title">Embracing Minimalism</h1>
            <p class="description">From minimalist sculptures to minimalist paintings, this blog will inspire you to appreciate the beauty that lies in simplicity.</p>
        </div>

        <div class="author">Annie Spratt</div>

    </div>

</body>
</html>
